<app-page-header titulo="Meu Carrinho"></app-page-header>

@if (carregando()) {
	<div class="flex justify-center py-12">
		<p-progressSpinner></p-progressSpinner>
	</div>
} @else if (cart().items.length === 0) {
	<div class="flex flex-col items-center gap-3 py-16" style="color: var(--text-secondary)">
		<i class="pi pi-shopping-cart text-5xl"></i>
		<span>Seu carrinho está vazio</span>
	</div>
} @else {
	<div class="flex flex-col gap-4 p-4 pb-32">
		@for (item of cart().items; track item.id) {
			<div class="flex items-center gap-3 rounded-lg bg-white p-3 shadow">
				<div class="h-20 w-20 flex-shrink-0 overflow-hidden rounded-lg" style="background-color: var(--surface-soft-green)">
					@if (primeiraImagem(item)) {
						<img [src]="primeiraImagem(item)" class="h-full w-full object-cover" [alt]="item.menuItem.name" />
					} @else {
						<div class="flex h-full w-full items-center justify-center">
							<i class="pi pi-image text-2xl" style="color: var(--secondary-light)"></i>
						</div>
					}
				</div>

				<div class="flex flex-1 flex-col gap-1">
					<span class="font-semibold" style="color: var(--text-primary)">{{ item.menuItem.name }}</span>
					<span class="font-bold" style="color: var(--secondary-base)">{{ item.menuItem.price | brl }}</span>
				</div>

				<div class="flex items-center gap-2">
					<button
						type="button"
						class="flex h-8 w-8 items-center justify-center rounded-full border"
						style="border-color: var(--secondary-light)"
						(click)="diminuir(item)"
					>
						<i class="pi pi-minus text-xs"></i>
					</button>
					<span class="w-6 text-center">{{ item.quantity }}</span>
					<button
						type="button"
						class="flex h-8 w-8 items-center justify-center rounded-full border"
						style="border-color: var(--secondary-light)"
						(click)="aumentar(item)"
					>
						<i class="pi pi-plus text-xs"></i>
					</button>
				</div>

				<button type="button" class="ml-2 text-red-600" (click)="remover(item)">
					<i class="pi pi-trash"></i>
				</button>
			</div>
		}
	</div>

	<div class="fixed right-0 bottom-0 left-0 border-t bg-white p-4">
		<div class="mx-auto flex max-w-2xl items-center justify-between">
			<span class="text-lg font-semibold" style="color: var(--text-primary)">Total:</span>
			<span class="text-2xl font-bold" style="color: var(--secondary-base)">{{ cart().total | brl }}</span>
		</div>
		<button pButton label="Finalizar Pedido" class="mx-auto mt-3 block w-full max-w-2xl" (click)="finalizarPedido()"></button>
	</div>
}
