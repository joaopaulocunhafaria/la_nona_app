<div class="flex min-h-screen flex-col items-center justify-center gap-8 px-6" style="background-color: var(--primary-base)">
	<div class="flex flex-col items-center gap-2 text-center">
		<i class="pi pi-building text-5xl" style="color: var(--accent-gold-soft)"></i>
		<h1 class="brand-title text-5xl font-bold sm:text-7xl">La Nona</h1>
		<p class="max-w-sm text-base" style="color: var(--text-on-dark)">Sabores que aquecem o coração, agora a um clique de distância.</p>
	</div>

	<div class="flex w-full max-w-xs flex-col items-center gap-4">
		<button pButton label="Entrar com Email" icon="pi pi-envelope" class="w-full" styleClass="w-full" (click)="irParaLogin()"></button>

		@if (googleLoginHabilitado) {
			<div class="flex w-full items-center gap-3">
				<p-divider styleClass="grow"></p-divider>
				<span style="color: var(--text-on-dark)">ou</span>
				<p-divider styleClass="grow"></p-divider>
			</div>

			<div class="flex w-full items-center justify-center">
				@if (carregandoGoogle) {
					<p-progressSpinner styleClass="!h-8 !w-8"></p-progressSpinner>
				}
				<div #googleButton></div>
			</div>
		}
	</div>
</div>
